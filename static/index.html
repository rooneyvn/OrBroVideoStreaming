<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrBro — Giám sát camera</title>
  <link rel="stylesheet" href="/static/css/dashboard.css?v=22" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <div>
        <h1>OrBro Video Streaming</h1>
        <p class="subtitle">Giám sát đa kênh RTSP / HLS</p>
      </div>
    </div>

    <div class="metrics" id="system-metrics">
      <div class="metric">
        <span class="metric-label">CPU</span>
        <span class="metric-value" id="metric-cpu">—</span>
      </div>
      <div class="metric">
        <span class="metric-label">Memory</span>
        <span class="metric-value" id="metric-memory">—</span>
      </div>
      <div class="metric">
        <span class="metric-label">GPU</span>
        <span class="metric-value" id="metric-gpu" title="GPU utilization">—</span>
      </div>
      <div class="metric">
        <span class="metric-label">Luồng active</span>
        <span class="metric-value" id="metric-streams">—</span>
      </div>
    </div>

    <div class="toolbar">
      <label class="control">
        <span>Lưới</span>
        <select id="grid-size">
          <option value="4">2 × 2 (4)</option>
          <option value="9">3 × 3 (9)</option>
          <option value="16">4 × 4 (16)</option>
          <option value="32">4 × 8 (32)</option>
        </select>
      </label>
      <button type="button" class="btn btn-primary" id="btn-add-camera">+ Thêm camera</button>
      <button type="button" class="btn btn-ghost" id="btn-toggle-panel">Quản lý</button>
      <button type="button" class="btn btn-ghost" id="btn-events-log">Nhật ký</button>
      <a class="btn btn-ghost" href="/docs" target="_blank" rel="noopener">API Docs</a>
    </div>
  </header>

  <main class="layout">
    <section class="grid-section">
      <div class="section-head">
        <h2>Giám sát</h2>
        <p id="last-updated">Đang tải...</p>
      </div>
      <div class="video-grid grid-4" id="video-grid"></div>
    </section>

    <aside class="side-panel hidden" id="side-panel">
      <div class="panel-head">
        <h2>Quản lý camera</h2>
        <button type="button" class="btn-icon" id="btn-close-panel" title="Đóng">×</button>
      </div>
      <div class="panel-actions">
        <button type="button" class="btn btn-primary btn-sm" id="btn-panel-add">+ Thêm</button>
      </div>
      <div class="camera-list" id="camera-list"></div>
    </aside>
  </main>

  <dialog class="modal" id="camera-modal">
    <form id="camera-form" class="modal-body">
      <div class="modal-head">
        <h3 id="modal-title">Thêm camera</h3>
        <button type="button" class="btn-icon" data-action="close-modal" title="Đóng">×</button>
      </div>

      <input type="hidden" id="form-camera-id" />

      <label class="field">
        <span>Tên camera</span>
        <input type="text" id="form-name" required placeholder="Camera 1" />
      </label>

      <label class="field">
        <span>RTSP URL</span>
        <input type="text" id="form-source" placeholder="rtsp://mediamtx:8554/source" />
      </label>

      <label class="field">
        <span>Mock video (.mp4)</span>
        <select id="form-mock-video">
          <option value="">— Tự chọn / RTSP —</option>
        </select>
      </label>

      <div class="field-row field-row-fps">
        <label class="field">
          <span>FPS</span>
          <input type="number" id="form-fps" min="1" max="60" value="10" required />
        </label>
      </div>

      <label class="field">
        <span>Độ phân giải relay</span>
        <div class="res-presets res-presets-form" id="form-res-presets"></div>
        <input type="hidden" id="form-width" value="640" />
        <input type="hidden" id="form-height" value="360" />
      </label>

      <label class="field">
        <span>Ô lưới (1–32, để trống = tự gán)</span>
        <input type="number" id="form-grid-slot" min="1" max="32" placeholder="auto" />
      </label>

      <label class="field checkbox-field">
        <input type="checkbox" id="form-active" checked />
        <span>Bật camera (phát luồng)</span>
      </label>

      <div class="modal-foot">
        <button type="button" class="btn btn-danger hidden" id="btn-delete-camera">Xóa</button>
        <div class="modal-foot-right">
          <button type="button" class="btn btn-ghost" data-action="close-modal">Hủy</button>
          <button type="submit" class="btn btn-primary" id="btn-save-camera">Lưu</button>
        </div>
      </div>
    </form>
  </dialog>

  <dialog class="modal modal-sm" id="status-modal">
    <div class="modal-body">
      <div class="modal-head">
        <h3 id="status-modal-title">Trạng thái camera</h3>
        <button type="button" class="btn-icon" data-action="close-status" title="Đóng">×</button>
      </div>
      <dl class="status-dl" id="status-details"></dl>
      <div class="modal-foot">
        <button type="button" class="btn btn-ghost" data-action="close-status">Đóng</button>
        <div class="modal-foot-right">
          <button type="button" class="btn btn-ghost" id="btn-status-events">Nhật ký</button>
          <button type="button" class="btn btn-primary" id="btn-status-edit">Chỉnh sửa</button>
        </div>
      </div>
    </div>
  </dialog>

  <dialog class="modal modal-events" id="events-modal">
    <div class="modal-body">
      <div class="modal-head">
        <h3>Nhật ký sự kiện stream</h3>
        <button type="button" class="btn-icon" data-action="close-events" title="Đóng">×</button>
      </div>

      <div class="events-toolbar">
        <label class="control events-filter">
          <span>Camera</span>
          <select id="events-filter-camera">
            <option value="">Tất cả camera</option>
          </select>
        </label>
        <label class="control events-filter">
          <span>Số dòng</span>
          <select id="events-limit">
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
        </label>
        <button type="button" class="btn btn-ghost btn-sm" id="btn-events-refresh">Làm mới</button>
      </div>

      <p class="events-meta" id="events-meta">Đang tải...</p>
      <div class="events-list" id="events-list"></div>

      <div class="modal-foot">
        <button type="button" class="btn btn-ghost" data-action="close-events">Đóng</button>
      </div>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
  <script src="/static/js/dashboard.js?v=24"></script>
</body>
</html>
