<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrBro — Camera Monitoring</title>
  <link rel="stylesheet" href="/static/css/dashboard.css?v=26" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark"></span>
      <div>
        <h1>OrBro Video Streaming</h1>
        <p class="subtitle">Multi-channel RTSP / HLS Monitoring</p>
      </div>
    </div>

    <div class="metrics" id="system-metrics">
      <div class="metric">
        <span class="metric-label">CPU</span>
        <span class="metric-value" id="metric-cpu">—</span>
      </div>
      <div class="metric">
        <span class="metric-label">Memory</span>
        <span class="metric-value" id="metric-memory">—</span>
      </div>
      <div class="metric">
        <span class="metric-label">GPU</span>
        <span class="metric-value" id="metric-gpu" title="GPU utilization">—</span>
      </div>
      <div class="metric">
        <span class="metric-label">Active streams</span>
        <span class="metric-value" id="metric-streams">—</span>
      </div>
    </div>

    <div class="toolbar">
      <label class="control">
        <span>Grid</span>
        <select id="grid-size">
          <option value="4">2 × 2 (4)</option>
          <option value="9">3 × 3 (9)</option>
          <option value="16">4 × 4 (16)</option>
          <option value="32">4 × 8 (32)</option>
        </select>
      </label>
      <button type="button" class="btn btn-primary" id="btn-add-camera">+ Add Camera</button>
      <button type="button" class="btn btn-ghost" id="btn-toggle-panel">Manage</button>
      <a class="btn btn-ghost" href="/logs">Logs</a>
      <a class="btn btn-ghost" href="/docs" target="_blank" rel="noopener">API Docs</a>
    </div>
  </header>

  <main class="layout">
    <section class="grid-section">
      <div class="section-head">
        <h2>Monitoring</h2>
        <p id="last-updated">Loading...</p>
      </div>
      <div class="video-grid grid-4" id="video-grid"></div>
    </section>

    <aside class="side-panel hidden" id="side-panel">
      <div class="panel-head">
        <h2>Camera Management</h2>
        <button type="button" class="btn-icon" id="btn-close-panel" title="Close">×</button>
      </div>
      <div class="panel-actions">
        <button type="button" class="btn btn-primary btn-sm" id="btn-panel-add">+ Add</button>
      </div>
      <div class="camera-list" id="camera-list"></div>
    </aside>
  </main>

  <dialog class="modal" id="camera-modal">
    <form id="camera-form" class="modal-body">
      <div class="modal-head">
        <h3 id="modal-title">Add Camera</h3>
        <button type="button" class="btn-icon" data-action="close-modal" title="Close">×</button>
      </div>

      <input type="hidden" id="form-camera-id" />

      <label class="field">
        <span>Camera Name</span>
        <input type="text" id="form-name" required placeholder="Camera 1" />
      </label>

      <label class="field">
        <span>RTSP URL</span>
        <input type="text" id="form-source" placeholder="rtsp://mediamtx:8554/source" />
      </label>

      <label class="field">
        <span>Mock video (.mp4)</span>
        <select id="form-mock-video">
          <option value="">— Custom / RTSP —</option>
        </select>
      </label>

      <div class="field-row field-row-fps">
        <label class="field">
          <span>FPS</span>
          <input type="number" id="form-fps" min="1" max="60" value="10" required />
        </label>
      </div>

      <label class="field">
        <span>Relay Resolution</span>
        <div class="res-presets res-presets-form" id="form-res-presets"></div>
        <input type="hidden" id="form-width" value="640" />
        <input type="hidden" id="form-height" value="360" />
      </label>

      <label class="field">
        <span>Grid Slot (1–32, empty = auto)</span>
        <input type="number" id="form-grid-slot" min="1" max="32" placeholder="auto" />
      </label>

      <label class="field checkbox-field">
        <input type="checkbox" id="form-active" checked />
        <span>Enable camera (start stream)</span>
      </label>

      <div class="modal-foot">
        <button type="button" class="btn btn-danger hidden" id="btn-delete-camera">Delete</button>
        <div class="modal-foot-right">
          <button type="button" class="btn btn-ghost" data-action="close-modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-save-camera">Save</button>
        </div>
      </div>
    </form>
  </dialog>

  <dialog class="modal modal-sm" id="status-modal">
    <div class="modal-body">
      <div class="modal-head">
        <h3 id="status-modal-title">Camera Status</h3>
        <button type="button" class="btn-icon" data-action="close-status" title="Close">×</button>
      </div>
      <dl class="status-dl" id="status-details"></dl>
      <div class="modal-foot">
        <button type="button" class="btn btn-ghost" data-action="close-status">Close</button>
        <div class="modal-foot-right">
          <button type="button" class="btn btn-ghost" id="btn-status-events">Logs</button>
          <button type="button" class="btn btn-primary" id="btn-status-edit">Edit</button>
        </div>
      </div>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
  <script src="/static/js/dashboard.js?v=32"></script>
</body>
</html>
