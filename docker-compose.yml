version: '3.8'
services:
  # 1. Media Server (Nhận và phát RTSP/WebRTC)
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS (dashboard)
      - "8889:8889"   # WebRTC signaling
      - "8189:8189/udp"
      - "8189:8189/tcp"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  # 2. Mock Camera (Phát lặp lại file video gốc thành luồng RTSP)
  mock_camera:
    image: jrottenberg/ffmpeg:4.4-alpine
    volumes:
      - ./data:/data
      - ./scripts/mock-camera.sh:/mock-camera.sh:ro
    environment:
      # Chọn video (ưu tiên): MOCK_VIDEO_FILE > MOCK_VIDEO_NAME > MOCK_VIDEO_MODE
      # MOCK_VIDEO_NAME=office.mp4   — chỉ tên file trong data/Video_BE.mp4/
      # MOCK_VIDEO_MODE=random       — random mỗi lần container start (fixed|random|first)
      - MOCK_VIDEO_FILE=${MOCK_VIDEO_FILE:-}
      - MOCK_VIDEO_NAME=${MOCK_VIDEO_NAME:-}
      - MOCK_VIDEO_MODE=${MOCK_VIDEO_MODE:-fixed}
      - MOCK_VIDEO_DIR=${MOCK_VIDEO_DIR:-/data/Video_BE.mp4}
    entrypoint: ["/bin/sh", "/mock-camera.sh"]
    depends_on:
      mediamtx:
        condition: service_started
    restart: unless-stopped

  # 3. MongoDB
  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 4. FastAPI app
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - PYTHONUNBUFFERED=1
      - MEDIA_SERVER_HOST=mediamtx
      - MOCK_VIDEO_DIR=/app/data/Video_BE.mp4
      - MOCK_VIDEO_PICK=random
      # CPU relay tuning (Docker on Mac = software libx264 only)
      - RELAY_WIDTH=640
      - RELAY_HEIGHT=360
      - RELAY_DEFAULT_FPS=10
      - RELAY_BITRATE=256k
      - RELAY_PRESET=ultrafast
      - RELAY_THREADS=1
      - STREAM_START_STAGGER_MS=300
      - MAX_CHANNELS=32
      - ALLOW_EVENT_SIMULATION=1
    depends_on:
      - mongo
      - mediamtx
    volumes:
      - ./:/app

volumes:
  mongo_data: