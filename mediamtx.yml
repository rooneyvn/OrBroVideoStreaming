logLevel: info

webrtcAllowOrigins: ['*']
webrtcAdditionalHosts: ['127.0.0.1', 'host.docker.internal']
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189

hls: yes
hlsAddress: :8888
hlsAllowOrigins: ['*']
hlsVariant: mpegts
hlsAlwaysRemux: true

paths:
  source:
    source: publisher
  all_others:
    source: publisher
